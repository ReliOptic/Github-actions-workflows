name: YouTube Monitor (Skeleton)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without making actual state changes'
        required: false
        type: boolean
        default: true
  # schedule:
  #   - cron: '0 1 * * *' # Example: Run daily at 10:00 KST

jobs:
  youtube-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r youtube-automation/requirements.txt
          
      - name: Run YouTube Fetcher
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python youtube-automation/src/fetch_videos.py
