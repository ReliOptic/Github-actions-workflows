name: Semiconductor KPI Scorecard

on:
  schedule:
    # 매주 화~토 UTC 00:00 (KST 09:00) - 미국장 마감 직후
    - cron: '0 0 * * 2-6'
  workflow_dispatch:

jobs:
  run-kpi-tracker:
    name: Generate KPI Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-automation/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news-automation/requirements.txt

      - name: Run KPI tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_INBOX: ${{ secrets.NOTION_DB_INBOX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd news-automation
          python src/kpi_tracker.py
