name: Daily Feed Healthcheck

on:
  schedule:
    # 매일 UTC 22:00 (KST 07:00) 점검
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-healthcheck:
    name: RSS Feed Status Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-automation/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news-automation/requirements.txt

      - name: Run feed healthcheck
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd news-automation
          python src/healthcheck_feeds.py
