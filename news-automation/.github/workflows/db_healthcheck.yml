name: Notion DB Healthcheck

on:
  schedule:
    # 매주 일요일 UTC 14:00 (KST 23:00) 점검
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  run-db-healthcheck:
    name: Weekly DB Quality Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-automation/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news-automation/requirements.txt

      - name: Run DB healthcheck
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_INBOX: ${{ secrets.NOTION_DB_INBOX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd news-automation
          python src/db_healthcheck.py
