name: Weekly Insight Recap

on:
  schedule:
    # 매주 금요일 UTC 09:00 (KST 18:00) 정리
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  run-recap:
    name: Generate Weekly Recap with Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-automation/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news-automation/requirements.txt

      - name: Run weekly recap
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_INBOX: ${{ secrets.NOTION_DB_INBOX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd news-automation
          python src/weekly_recap.py
