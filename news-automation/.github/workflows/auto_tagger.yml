name: Notion DB Auto Tagger

on:
  schedule:
    # 매일 UTC 17:00 (KST 02:00 새벽) - 당일 발행된 글에 자동 태그 부착
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-auto-tagger:
    name: Auto Category Tagging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-automation/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news-automation/requirements.txt

      - name: Run Auto Tagger
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_INBOX: ${{ secrets.NOTION_DB_INBOX }}
        run: |
          cd news-automation
          python src/auto_tagger.py
