name: Brief Accuracy Tracker

on:
  schedule:
    # 매일 UTC 04:00 (KST 13:00) - 일일 뉴스레터(KST 12:00) 발행 1시간 후
    - cron: '0 4 * * 2-6' # Tue~Sat morning KST corresponds to Mon~Fri overnight markets
  workflow_dispatch:

jobs:
  run-accuracy-tracker:
    name: Compare Premarket with Daily
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-automation/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news-automation/requirements.txt

      - name: Run accuracy tracker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_INBOX: ${{ secrets.NOTION_DB_INBOX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd news-automation
          python src/accuracy_tracker.py
