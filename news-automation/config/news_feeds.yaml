# Keywords for noise/spam filtering
noise_keywords:
  - "giveaway"
  - "airdrop"
  - "click here"
  - "limited offer"
  - "act now"
  - "don't miss out"
  - "shocking"
  - "you won't believe"
  - "explosive"
  - "moonshot"
  - "to the moon"
  - "pump"
  - "rug pull"
  - "get rich"
  - "guaranteed"
  - "100x"
  - "1000x"

# Clickbait / overstatement patterns (regex)
clickbait_patterns:
  - "(?i)\\bbreaking(?:\\s+news)?\\b.*!{2,}"
  - "(?i)\\beveryone is talking about\\b"
  - "(?i)\\bwhat you need to know\\b.*!{2,}"
  - "(?i)\\bchina (just|now)\\b.*!+"

# URL normalization: strip these query params before dedup
url_strip_params:
  - utm_source
  - utm_medium
  - utm_campaign
  - utm_content
  - utm_term
  - ref
  - source
